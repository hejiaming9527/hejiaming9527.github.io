---
layout: compress
---

<!doctype html>
{% include assets-origin.html %}
<html lang="{{ site.lang }}" data-mode="dark">
  {% include head.html %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <body class="portfolio-page">
    {% include sidebar.html %}
    {% include topbar.html %}

    <div id="main-wrapper" class="d-flex justify-content-center">
      <main id="main" class="portfolio-main">
        <div class="portfolio-shell">
          {{ content }}
        </div>
        <footer class="portfolio-footer">
          <span>© {{ 'now' | date: '%Y' }} 何嘉明</span>
          <span>电子信息工程 · 持续学习，认真做事</span>
        </footer>
      </main>
      {% include search-results.html %}
    </div>

    <a id="back-to-top" href="#" aria-label="返回顶部" class="portfolio-back-top">
      <i class="fas fa-angle-up"></i>
    </a>
    <div id="mask"></div>
    {% include search-loader.html %}
    <script>
      (() => {
        const threshold = 360;
        const toggleBackToTop = () => {
          document.body.classList.toggle('back-to-top-visible', window.scrollY > threshold);
        };
        window.addEventListener('scroll', toggleBackToTop, { passive: true });
        document.querySelector('#back-to-top').addEventListener('click', (event) => {
          event.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        toggleBackToTop();
      })();
    </script>
    {% include js-selector.html %}
  </body>
</html>
